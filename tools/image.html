<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片查看器 - Powered by Github&彬哥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            background-image: url('https://binge1129.github.io/img/2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 输入界面样式 */
        .input-container {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-title {
            font-size: 2em;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .input-field {
            padding: 12px 20px;
            font-size: 1.2em;
            border: 2px solid rgba(100, 181, 246, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            width: 150px;
            backdrop-filter: blur(5px);
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(100, 181, 246, 0.8);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-confirm {
            padding: 12px 30px;
            font-size: 1.2em;
            background: rgba(100, 181, 246, 0.2);
            border: 2px solid rgba(100, 181, 246, 0.5);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            font-weight: 600;
        }

        .btn-confirm:hover {
            background: rgba(100, 181, 246, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* 图片查看界面样式 */
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: none; /* 初始隐藏 */
        }

        .viewer-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* 控制按钮样式 */
        .control-buttons {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .btn-control {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-control:hover {
            background: rgba(0, 0, 0, 0.7);
            transform: translateY(-2px);
        }

        .btn-reset {
            background: rgba(244, 67, 54, 0.5);
            border: 1px solid rgba(244, 67, 54, 0.7);
        }

        .btn-reset:hover {
            background: rgba(244, 67, 54, 0.7);
        }

        /* 图标样式 */
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .input-container {
                padding: 30px 20px;
            }

            .input-title {
                font-size: 1.5em;
            }

            .input-group {
                flex-direction: column;
                gap: 15px;
            }

            .input-field {
                width: 100%;
            }

            .btn-control {
                padding: 8px 15px;
                font-size: 0.9em;
            }

            .control-buttons {
                top: 10px;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 输入界面 -->
    <div class="input-container" id="inputContainer">
        <h1 class="input-title">请输入图片序号</h1>
        <div class="input-group">
            <input type="number" class="input-field" id="imageNumber" placeholder="输入数字" min="1">
            <button class="btn-confirm" onclick="viewImage()">确认</button>
        </div>
    </div>

    <!-- 图片查看界面 -->
    <div class="viewer-container" id="viewerContainer">
        <div class="control-buttons">
            <a href="https://binge1129.github.io/index.html" class="btn-control">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                返回
            </a>
            <button class="btn-control btn-reset" onclick="resetViewer()">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                重置
            </button>
        </div>
        <img class="viewer-image" id="viewerImage" src="" alt="查看的图片">
    </div>

    <script>
        // 查看图片函数
        function viewImage() {
            const imageNumber = document.getElementById('imageNumber').value;
            
            if (!imageNumber || imageNumber < 1) {
                alert('请输入有效的图片序号！');
                return;
            }

            // 构造图片URL
            const imageUrl = `https://binge1129.github.io/img/${imageNumber}.jpg`;
            
            // 预加载图片
            const img = new Image();
            img.onload = function() {
                // 图片加载成功，切换到查看器
                document.getElementById('viewerImage').src = imageUrl;
                document.getElementById('inputContainer').style.display = 'none';
                document.getElementById('viewerContainer').style.display = 'block';
                
                // 清空输入框
                document.getElementById('imageNumber').value = '';
            };
            
            img.onerror = function() {
                alert(`图片 ${imageNumber}.jpg 不存在，请检查序号！`);
            };
            
            img.src = imageUrl;
        }

        // 重置查看器，返回输入界面
        function resetViewer() {
            document.getElementById('viewerContainer').style.display = 'none';
            document.getElementById('inputContainer').style.display = 'flex';
            document.getElementById('viewerImage').src = '';
            
            // 清空输入框
            document.getElementById('imageNumber').value = '';
        }

        // 监听回车键
        document.getElementById('imageNumber').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                viewImage();
            }
        });
    </script>
</body>
</html>
